<section class="lp-voice lp-voice--b">
  <div class="lp-voice-b__inner">
    <h2 class="lp-voice-b__heading">{{heading}}</h2>
    <div class="lp-voice-b__grid">
      <!-- ITEM_TEMPLATE -->
      <div class="lp-voice-b__bubble-wrap">
        <div class="lp-voice-b__phone">
          <div class="lp-voice-b__phone-header">
            <div class="lp-voice-b__phone-dot"></div>
            <div class="lp-voice-b__phone-dot"></div>
            <div class="lp-voice-b__phone-dot"></div>
          </div>
          <div class="lp-voice-b__chat">
            <div class="lp-voice-b__msg lp-voice-b__msg--other">
              <div class="lp-voice-b__avatar">
                <img src="{{photo}}" alt="" onerror="this.style.display='none'">
              </div>
              <div class="lp-voice-b__bubble">
                <p class="lp-voice-b__bubble-text">{{comment}}</p>
              </div>
            </div>
          </div>
        </div>
        <p class="lp-voice-b__name">{{name}}</p>
      </div>
      <!-- /ITEM_TEMPLATE -->
    </div>
  </div>
</section>

<style>
.lp-voice--b {
  background: var(--lp-color-bg);
  padding: 120px 40px;
}
.lp-voice-b__inner {
  max-width: 1100px;
  margin: 0 auto;
}
.lp-voice-b__heading {
  font-size: clamp(36px, 5vw, 58px);
  font-weight: 900;
  color: var(--lp-color-text);
  text-align: center;
  margin-bottom: 64px;
  line-height: 1.2;
  letter-spacing: -0.02em;
}
.lp-voice-b__grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 24px;
}
.lp-voice-b__bubble-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}
.lp-voice-b__phone {
  background: #1a1a1a;
  border-radius: 24px;
  padding: 16px;
  width: 100%;
  max-width: 280px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.lp-voice-b__phone-header {
  display: flex;
  gap: 6px;
  margin-bottom: 16px;
  padding: 0 4px;
}
.lp-voice-b__phone-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #444;
}
.lp-voice-b__phone-dot:first-child { background: #ff5f57; }
.lp-voice-b__phone-dot:nth-child(2) { background: #febc2e; }
.lp-voice-b__phone-dot:last-child { background: #28c840; }
.lp-voice-b__chat {
  background: #fff;
  border-radius: 14px;
  padding: 16px 12px;
  min-height: 100px;
}
.lp-voice-b__msg { display: flex; align-items: flex-start; gap: 8px; }
.lp-voice-b__avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  overflow: hidden;
  background: var(--lp-color-main);
  flex-shrink: 0;
}
.lp-voice-b__avatar img { width: 100%; height: 100%; object-fit: cover; }
.lp-voice-b__bubble {
  background: #f0f0f0;
  border-radius: 0 14px 14px 14px;
  padding: 12px 14px;
  max-width: calc(100% - 44px);
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.lp-voice-b__bubble-text {
  font-size: 13px;
  color: #222;
  line-height: 1.8;
}
.lp-voice-b__name {
  font-size: 13px;
  font-weight: 600;
  color: #888;
  text-align: center;
}
@media (max-width: 768px) {
  .lp-voice--b { padding: 72px 24px; }
  .lp-voice-b__grid { grid-template-columns: 1fr; }
}
</style>
