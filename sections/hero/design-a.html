<section class="lp-hero lp-hero--a">
  <div class="lp-hero-a__bg" style="background-image: url('{{bgImage}}');"></div>
  <div class="lp-hero-a__overlay"></div>
  <div class="lp-hero-a__inner">
    <p class="lp-hero-a__sub">{{subheading}}</p>
    <h1 class="lp-hero-a__catch">{{catchcopy}}</h1>
    <a href="{{ctaUrl}}" class="lp-btn lp-hero-a__cta">{{ctaText}}</a>
  </div>
</section>

<style>
.lp-hero--a {
  position: relative;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.lp-hero-a__bg {
  position: absolute;
  inset: -10%;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-color: var(--lp-color-main);
  will-change: transform;
}
.lp-hero-a__overlay {
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, 0.45);
  pointer-events: none;
}
.lp-hero-a__inner {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 40px 24px;
  max-width: 800px;
  width: 100%;
  margin: 0 auto;
}
.lp-hero-a__sub {
  font-size: 16px;
  color: rgba(255,255,255,0.85);
  letter-spacing: 0.12em;
  margin-bottom: 20px;
  font-weight: 400;
}
.lp-hero-a__catch {
  font-size: clamp(32px, 6vw, 60px);
  font-weight: 900;
  color: #fff;
  line-height: 1.4;
  margin-bottom: 40px;
  text-shadow: 0 2px 12px rgba(0,0,0,0.4);
  white-space: pre-wrap;
}
.lp-hero-a__cta {
  font-size: 18px;
  padding: 18px 60px;
  border-radius: 50px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.3);
