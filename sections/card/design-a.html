<section class="lp-card lp-card--a">
  <div class="lp-card-a__inner">
    <h2 class="lp-card-a__heading">{{heading}}</h2>
    <div class="lp-card-a__grid">
      <!-- ITEM_TEMPLATE -->
      <div class="lp-card-a__card">
        <div class="lp-card-a__img-wrap">
          <img src="{{image}}" alt="{{title}}" class="lp-card-a__img" onerror="this.closest('.lp-card-a__img-wrap').classList.add('lp-card-a__img-wrap--empty')">
        </div>
        <div class="lp-card-a__body-wrap">
          <p class="lp-card-a__title">{{title}}</p>
          <p class="lp-card-a__body">{{body}}</p>
          <a href="{{ctaUrl}}" class="lp-btn lp-card-a__btn">{{ctaText}}</a>
        </div>
      </div>
      <!-- /ITEM_TEMPLATE -->
    </div>
  </div>
</section>

<style>
.lp-card--a {
  background: #f9fafb;
  padding: 80px 24px;
}
.lp-card-a__inner {
  max-width: 1100px;
  margin: 0 auto;
}
.lp-card-a__heading {
  font-size: clamp(22px, 4vw, 36px);
  font-weight: 900;
  color: var(--lp-color-text);
  text-align: center;
  margin-bottom: 56px;
  line-height: 1.5;
  position: relative;
  padding-bottom: 20px;
}
.lp-card-a__heading::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 48px;
  height: 3px;
  background: var(--lp-color-main);
  border-radius: 2px;
}
.lp-card-a__grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 28px;
}
.lp-card-a__card {
  background: #fff;
  border-radius: 14px;
  overflow: hidden;
  border: 1px solid #e5e7eb;
  box-shadow: 0 2px 16px rgba(0,0,0,0.06);
  display: flex;
  flex-direction: column;
}
.lp-card-a__img-wrap {
  aspect-ratio: 1;
  overflow: hidden;
  background: #f3f4f6;
}
.lp-card-a__img-wrap--empty {
  background: linear-gradient(135deg, var(--lp-color-accent) 0%, var(--lp-color-main) 100%);
}
.lp-card-a__img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.lp-card-a__body-wrap {
  padding: 24px 20px 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  flex: 1;
}
.lp-card-a__title {
  font-size: 16px;
  font-weight: 700;
  color: var(--lp-color-text);
  line-height: 1.5;
}
.lp-card-a__body {
  font-size: 14px;
  color: #555;
  line-height: 1.8;
  flex: 1;
}
.lp-card-a__btn {
  display: block;
  text-align: center;
  background: var(--lp-color-main);
  color: #fff;
  font-size: 14px;
  font-weight: 700;
  padding: 12px 20px;
  border-radius: 40px;
  text-decoration: none;
  margin-top: 6px;
  transition: opacity 0.2s;
}
.lp-card-a__btn:hover { opacity: 0.82; }
@media (max-width: 900px) {
  .lp-card-a__grid { grid-template-columns: 1fr; }
}
@media (min-width: 601px) and (max-width: 900px) {
  .lp-card-a__grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 600px) {
  .lp-card--a { padding: 60px 16px; }
  .lp-card-a__grid { grid-template-columns: 1fr; }
}
</style>
