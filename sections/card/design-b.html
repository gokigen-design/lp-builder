<section class="lp-card lp-card--b">
  <div class="lp-card-b__inner">
    <h2 class="lp-card-b__heading">{{heading}}</h2>
    <div class="lp-card-b__grid">
      <!-- ITEM_TEMPLATE -->
      <div class="lp-card-b__card">
        <div class="lp-card-b__img-wrap">
          <img src="{{image}}" alt="{{title}}" class="lp-card-b__img" onerror="this.closest('.lp-card-b__img-wrap').classList.add('lp-card-b__img-wrap--empty')">
        </div>
        <div class="lp-card-b__body-wrap">
          <p class="lp-card-b__title">{{title}}</p>
          <p class="lp-card-b__body">{{body}}</p>
          <a href="{{ctaUrl}}" class="lp-btn lp-card-b__btn">{{ctaText}}</a>
        </div>
      </div>
      <!-- /ITEM_TEMPLATE -->
    </div>
  </div>
</section>

<style>
.lp-card--b {
  background: #f8f8f6;
  padding: 120px 40px;
}
.lp-card-b__inner {
  max-width: 900px;
  margin: 0 auto;
}
.lp-card-b__heading {
  font-size: clamp(36px, 5vw, 58px);
  font-weight: 900;
  color: var(--lp-color-text);
  text-align: center;
  margin-bottom: 64px;
  line-height: 1.2;
  letter-spacing: -0.02em;
}
.lp-card-b__heading::after {
  content: '';
  display: block;
  width: 40px;
  height: 3px;
  background: var(--lp-color-main);
  margin: 16px auto 0;
  border-radius: 2px;
}
.lp-card-b__grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 24px;
}
.lp-card-b__card {
  background: #f8f8f6;
  border-radius: 4px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.lp-card-b__img-wrap {
  aspect-ratio: 4 / 3;
  overflow: hidden;
  background: #e8e8e4;
}
.lp-card-b__img-wrap--empty {
  background: linear-gradient(135deg, var(--lp-color-accent) 0%, var(--lp-color-main) 100%);
}
.lp-card-b__img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.lp-card-b__body-wrap {
  padding: 24px 20px 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  flex: 1;
}
.lp-card-b__title {
  font-size: 16px;
  font-weight: 700;
  color: var(--lp-color-text);
  line-height: 1.5;
}
.lp-card-b__body {
  font-size: 14px;
  color: #555;
  line-height: 1.8;
  flex: 1;
}
.lp-card-b__btn {
  display: block;
  text-align: center;
  background: var(--lp-color-main);
  color: #fff;
  font-size: 14px;
  font-weight: 700;
  padding: 12px 20px;
  border-radius: 4px;
  text-decoration: none;
  margin-top: 6px;
  letter-spacing: 0.04em;
  transition: opacity 0.2s;
}
.lp-card-b__btn:hover { opacity: 0.82; }
@media (max-width: 768px) {
  .lp-card--b { padding: 72px 24px; }
  .lp-card-b__grid { grid-template-columns: 1fr; }
}
</style>
