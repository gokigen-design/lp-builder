<section class="lp-content lp-content--c">
  <div class="lp-content-c__bg" style="background-image: url('{{bgImage}}');"></div>
  <div class="lp-content-c__overlay" style="pointer-events: none;"></div>
  <div class="lp-content-c__inner">
    <div class="lp-content-c__grid">
      <div class="lp-content-c__text">
        <h2 class="lp-content-c__heading">{{heading}}</h2>
        <p class="lp-content-c__subheading">{{subheading}}</p>
        <p class="lp-content-c__body">{{body}}</p>
        <a href="{{ctaUrl}}" class="lp-btn lp-content-c__btn">{{ctaText}}</a>
      </div>
      <div class="lp-content-c__img-wrap">
        <img src="{{image}}" alt="{{heading}}" class="lp-content-c__img" onerror="this.closest('.lp-content-c__img-wrap').classList.add('lp-content-c__img-wrap--empty')">
      </div>
    </div>
  </div>
</section>

<style>
.lp-content--c {
  position: relative;
  padding: 120px 40px;
  overflow: hidden;
}
.lp-content-c__bg {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
  z-index: 0;
}
.lp-content-c__overlay {
  position: absolute;
  inset: 0;
  background: rgba(255, 255, 255, 0.88);
  z-index: 1;
  pointer-events: none;
}
.lp-content-c__inner {
  position: relative;
  z-index: 2;
  max-width: 1100px;
  margin: 0 auto;
}
.lp-content-c__grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 80px;
  align-items: center;
}
.lp-content-c__text {
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.lp-content-c__heading {
  font-size: clamp(36px, 5vw, 58px);
  font-weight: 900;
  color: var(--lp-color-text);
  line-height: 1.2;
  letter-spacing: -0.02em;
}
.lp-content-c__heading::after {
  content: '';
  display: block;
  width: 40px;
  height: 3px;
  background: var(--lp-color-main);
  margin: 16px 0 0;
  border-radius: 2px;
}
.lp-content-c__subheading {
  font-size: 16px;
  font-weight: 700;
  color: var(--lp-color-main);
  line-height: 1.6;
}
.lp-content-c__body {
  font-size: 16px;
  color: #374151;
  line-height: 1.9;
}
.lp-content-c__btn {
  display: inline-block;
  align-self: flex-start;
  background: var(--lp-color-main);
  color: #fff;
  font-size: 16px;
  font-weight: 700;
  padding: 18px 52px;
  border-radius: 4px;
  text-decoration: none;
  letter-spacing: 0.04em;
  transition: opacity 0.2s;
}
.lp-content-c__btn:hover { opacity: 0.82; }
.lp-content-c__img-wrap {
  border-radius: 8px;
  overflow: hidden;
  aspect-ratio: 4 / 3;
  background: #f3f4f6;
}
.lp-content-c__img-wrap--empty {
  background: linear-gradient(135deg, var(--lp-color-accent) 0%, var(--lp-color-main) 100%);
}
.lp-content-c__img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
@media (max-width: 768px) {
  .lp-content--c { padding: 72px 24px; }
  .lp-content-c__grid {
    grid-template-columns: 1fr;
    gap: 36px;
  }
  .lp-content-c__btn { align-self: stretch; text-align: center; }
}
</style>
