<section class="lp-content lp-content--d">
  <div class="lp-content-d__bg" style="background-image: url('{{bgImage}}');"></div>
  <div class="lp-content-d__overlay" style="pointer-events: none;"></div>
  <div class="lp-content-d__inner">
    <div class="lp-content-d__grid">
      <div class="lp-content-d__text">
        <h2 class="lp-content-d__heading">{{heading}}</h2>
        <p class="lp-content-d__subheading">{{subheading}}</p>
        <p class="lp-content-d__body">{{body}}</p>
        <a href="{{ctaUrl}}" class="lp-btn lp-content-d__btn">{{ctaText}}</a>
      </div>
      <div class="lp-content-d__img-wrap">
        <img src="{{image}}" alt="{{heading}}" class="lp-content-d__img" onerror="this.closest('.lp-content-d__img-wrap').classList.add('lp-content-d__img-wrap--empty')">
      </div>
    </div>
  </div>
</section>

<style>
.lp-content--d {
  position: relative;
  padding: 120px 40px;
  overflow: hidden;
}
.lp-content-d__bg {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
  z-index: 0;
}
.lp-content-d__overlay {
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, 0.62);
  z-index: 1;
  pointer-events: none;
}
.lp-content-d__inner {
  position: relative;
  z-index: 2;
  max-width: 1100px;
  margin: 0 auto;
}
.lp-content-d__grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 80px;
  align-items: center;
}
.lp-content-d__text {
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.lp-content-d__heading {
  font-size: clamp(36px, 5vw, 58px);
  font-weight: 900;
  color: #fff;
  line-height: 1.2;
  letter-spacing: -0.02em;
}
.lp-content-d__heading::after {
  content: '';
  display: block;
  width: 40px;
  height: 3px;
  background: rgba(255,255,255,0.7);
  margin: 16px 0 0;
  border-radius: 2px;
}
.lp-content-d__subheading {
  font-size: 16px;
  font-weight: 700;
  color: #fff;
  line-height: 1.6;
  opacity: 0.9;
}
.lp-content-d__body {
  font-size: 16px;
  color: #fff;
  line-height: 1.9;
  opacity: 0.85;
}
.lp-content-d__btn {
  display: inline-block;
  align-self: flex-start;
  background: var(--lp-color-accent);
  color: #fff;
  font-size: 16px;
  font-weight: 700;
  padding: 18px 52px;
  border-radius: 4px;
  text-decoration: none;
  letter-spacing: 0.04em;
  transition: opacity 0.2s;
}
.lp-content-d__btn:hover { opacity: 0.82; }
.lp-content-d__img-wrap {
  border-radius: 8px;
  overflow: hidden;
  aspect-ratio: 4 / 3;
  background: rgba(255,255,255,0.15);
}
.lp-content-d__img-wrap--empty {
  background: rgba(255,255,255,0.15);
}
.lp-content-d__img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
@media (max-width: 768px) {
  .lp-content--d { padding: 72px 24px; }
  .lp-content-d__grid {
    grid-template-columns: 1fr;
    gap: 36px;
  }
  .lp-content-d__btn { align-self: stretch; text-align: center; }
}
</style>
