<section class="lp-mondai lp-mondai--c">
  <div class="lp-mondai-c__inner">
    <h2 class="lp-mondai-c__heading">{{heading}}</h2>
    <div class="lp-mondai-c__layout">
      <div class="lp-mondai-c__person">
        <div class="lp-mondai-c__person-frame">
          <img src="{{personImage}}" alt="人物写真" class="lp-mondai-c__person-img" onerror="this.style.display='none'">
          <div class="lp-mondai-c__person-fallback"></div>
        </div>
      </div>
      <div class="lp-mondai-c__cards">
        <!-- ITEM_TEMPLATE -->
        <div class="lp-mondai-c__card">{{text}}</div>
        <!-- /ITEM_TEMPLATE -->
      </div>
    </div>
  </div>
</section>

<style>
.lp-mondai--c {
  background: var(--lp-color-bg);
  padding: 120px 40px;
}
.lp-mondai-c__inner {
  max-width: 960px;
  margin: 0 auto;
}
.lp-mondai-c__heading {
  font-size: clamp(36px, 5vw, 58px);
  font-weight: 900;
  color: var(--lp-color-text);
  text-align: center;
  margin-bottom: 64px;
  line-height: 1.2;
  letter-spacing: -0.02em;
}
.lp-mondai-c__heading::after {
  content: '';
  display: block;
  width: 40px;
  height: 3px;
  background: var(--lp-color-main);
  margin: 16px auto 0;
  border-radius: 2px;
}
.lp-mondai-c__layout {
  display: grid;
  grid-template-columns: 220px 1fr;
  gap: 48px;
  align-items: start;
}
.lp-mondai-c__person {
  position: sticky;
  top: 24px;
}
.lp-mondai-c__person-frame {
  width: 220px;
  height: 300px;
  border-radius: 110px 110px 40px 40px;
  overflow: hidden;
  border: 4px solid var(--lp-color-main);
  background: #f0eefc;
  position: relative;
}
.lp-mondai-c__person-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.lp-mondai-c__person-fallback {
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, var(--lp-color-accent) 0%, var(--lp-color-main) 100%);
  opacity: 0.25;
  pointer-events: none;
}
.lp-mondai-c__cards {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  align-content: start;
}
.lp-mondai-c__card {
  background: #fff;
  border: 1px solid #e8e8e4;
  border-radius: 4px;
  padding: 20px 24px;
  font-size: 15px;
  font-weight: 600;
  color: var(--lp-color-text);
  line-height: 1.6;
  position: relative;
}
.lp-mondai-c__card::before {
  content: '';
  position: absolute;
  left: 16px;
  top: 18px;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--lp-color-main);
  opacity: 0.25;
}
.lp-mondai-c__card::after {
  content: '';
  position: absolute;
  left: 19px;
  top: 21px;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--lp-color-main);
}
@media (max-width: 768px) {
  .lp-mondai--c { padding: 72px 24px; }
  .lp-mondai-c__layout {
    grid-template-columns: 1fr;
  }
  .lp-mondai-c__person {
    position: static;
    width: 160px;
    margin: 0 auto 32px;
  }
  .lp-mondai-c__person-frame { width: 160px; height: 220px; }
  .lp-mondai-c__cards { grid-template-columns: 1fr; }
}
</style>
